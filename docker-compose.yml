services:
  app:
    build:
      context: ./nodejs
      dockerfile: Dockerfile
    container_name: learnproof-app
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/learnproof_db?connection_limit=5&pool_timeout=10
      - SOCIAL_DATABASE_URL=postgresql://user:password@db:5432/learnproof_db?connection_limit=5&pool_timeout=10
      - REDIS_URL=redis://cache:6379
      - NODE_ENV=production
    env_file:
      - ./nodejs/.env
    volumes:
      - ./nodejs/media:/app/media
      - ./nodejs/prisma:/app/prisma
      - /home/ubuntu/.config/gcloud:/root/.config/gcloud:ro
    depends_on:
      - db
      - cache

  db:
    image: postgres:14-alpine
    container_name: learnproof-db
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=learnproof_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
  cache:
    image: redis:7-alpine
    container_name: learnproof-cache
    restart: always
    ports:
      - "6379:6379"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_BACKEND_URL=https://learnproofai.com
        - VITE_GOOGLE_CLIENT_ID=557947080645-2iqd1t1h79b273ktjqthcg6q23k9pem1.apps.googleusercontent.com
        - VITE_ADMIN_EMAIL=nitin9699176009@gmail.com
    container_name: learnproof-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt/live:/etc/letsencrypt/live:ro
      - /etc/letsencrypt/archive:/etc/letsencrypt/archive:ro
      - ./nodejs/media:/usr/share/nginx/html/media:ro
    depends_on:
      - app

volumes:
  postgres_data:
