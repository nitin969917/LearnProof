server {
    listen 80;
    server_name learnproofai.com www.learnproofai.com;
    
    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.learnproofai.com;
    ssl_certificate /etc/letsencrypt/live/learnproofai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/learnproofai.com/privkey.pem;
    return 301 https://learnproofai.com$request_uri;
}

server {
    listen 443 ssl;
    server_name learnproofai.com;

    ssl_certificate /etc/letsencrypt/live/learnproofai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/learnproofai.com/privkey.pem;

    # SSL optimizations
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /media/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /api {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
