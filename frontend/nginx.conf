worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # TCP optimizations
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Gzip compression — reduces transfer size by 60-80%
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2
        application/font-woff
        application/font-woff2;

    # Proxy buffer settings for Node API
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────
    server {
        listen 80;
        server_name learnproofai.com www.learnproofai.com api.learnproofai.com;
        return 301 https://$host$request_uri;
    }

    # ── www → apex redirect ───────────────────────────────────────
    server {
        listen 443 ssl;
        server_name www.learnproofai.com;
        ssl_certificate     /etc/letsencrypt/live/learnproofai.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/learnproofai.com/privkey.pem;
        return 301 https://learnproofai.com$request_uri;
    }

    # ── Main server ───────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name learnproofai.com api.learnproofai.com;

        ssl_certificate     /etc/letsencrypt/live/learnproofai.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/learnproofai.com/privkey.pem;

        # SSL optimizations
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── Static frontend files ─────────────────────────────────
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;

            # HTML: no cache (always fresh for SPA routing)
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
        }

        # ── Hashed JS/CSS bundles — safe to cache forever ─────────
        # Vite adds content hashes to filenames: main.a1b2c3.js
        # When code changes, filename changes, so 1-year cache is safe.
        location ~* \.(js|css)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Fonts, images, icons — long-term cache ────────────────
        location ~* \.(woff2|woff|ttf|otf|eot|svg|ico|png|jpg|jpeg|webp|gif)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Media uploads — 30 days cache ────────────────────────
        location /media/ {
            root /usr/share/nginx/html;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # ── Node.js API proxy ─────────────────────────────────────
        location /api/ {
            proxy_pass http://app:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Keep persistent connection to Node (no TCP handshake per request)
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 60s;
            # API responses must not be cached by Cloudflare/browser
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }

        # ── Exact /api match ──────────────────────────────────────
        location = /api {
            proxy_pass http://app:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ── WebSocket (Socket.io) ─────────────────────────────────
        location /socket.io/ {
            proxy_pass http://app:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;  # keep WebSocket alive
        }

        # ── Matrix (Conduit) ──────────────────────────────────────
        location /_matrix/ {
            proxy_pass http://conduit:8008;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s; # Matrix client sync relies on long polling
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
