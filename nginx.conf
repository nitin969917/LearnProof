worker_processes auto;        # use ALL available CPU cores
worker_rlimit_nofile 65535;   # allow more open file descriptors

events {
    worker_connections 4096;  # was 1024 — 4x more concurrent connections
    use epoll;                # most efficient I/O model on Linux
    multi_accept on;          # accept multiple connections at once
}

http {
    # TCP optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Buffer tuning
    client_body_buffer_size 128k;
    client_max_body_size 20m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://app:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Keep-alive to Node — avoids new TCP connection per request
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
    }
}
